name: CI-CD Deploy

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mytestapi:latest -f MyTestWebApi/Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/mytestapi:latest

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/mytestapi:latest
            docker stop mytestapi || true
            docker rm mytestapi || true
            docker run -d -p 8080:8080 --name mytestapi ${{ secrets.DOCKER_USERNAME }}/mytestapi:latest